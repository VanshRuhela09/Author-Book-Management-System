spring.application.name=Author-Book-Management-System

server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/AuthorBookDB
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=ThisIsAVerySecretKeyForJWTThatMustBeAtLeast256BitsLong!!
jwt.expiration-ms=86400000

# Return 404 instead of 401 for unknown endpoints
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# Logging configuration
logging.file.name=application.log
logging.level.root=INFO
# You can set more granular log levels if needed, e.g.:
# logging.level.com.example.authorbookmanagementsystem=DEBUG

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

