spring.application.name=${SPRING_APPLICATION_NAME:Author-Book-Management-System}

server.port=${SERVER_PORT:8081}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/AuthorBookDB}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:true}

# JWT
jwt.secret=${JWT_SECRET:ThisIsAVerySecretKeyForJWTThatMustBeAtLeast256BitsLong!!}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Return 404 instead of 401 for unknown endpoints
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# Logging configuration
logging.file.name=${LOGGING_FILE_NAME:application.log}
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
# You can set more granular log levels if needed, e.g.:
# logging.level.com.example.authorbookmanagementsystem=DEBUG

# Swagger / OpenAPI
springdoc.api-docs.path=${SPRINGDOC_API_DOCS_PATH:/v3/api-docs}
springdoc.swagger-ui.path=${SPRINGDOC_SWAGGER_UI_PATH:/swagger-ui.html}
springdoc.swagger-ui.operationsSorter=${SPRINGDOC_SWAGGER_UI_OPERATIONS_SORTER:method}
